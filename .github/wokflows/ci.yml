on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main

jobs:
    test:
        runs_on: ubuntu-latest

        services:
            mongodb:
                image: mongo:6.0
                ports:
                    - 27017:27017

        steps:
            - name: Checkout the code
              uses: actions/checkout@v7.0.0

            - name: Set node.js environment
              uses: actions/setup-node@v6.4.0
              with:
                  node-version: 24

            - name: Install the dependencies
              run: npm ci

            - name: Test the code
              run: npm test
